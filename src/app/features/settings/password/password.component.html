<div class="password">
  <h2 class="password__title">Zmiana hasła</h2>

  <form
    [formGroup]="passwordForm"
    (ngSubmit)="onSubmit()"
    class="password__form"
  >
    <div class="password__form-group">
      <label class="password__form-label">Obecne hasło:</label>
      <input
        type="password"
        formControlName="currentPassword"
        class="password__form-input"
        [class.password__form-input--error]="
          passwordForm.get('currentPassword')?.touched &&
          passwordForm.get('currentPassword')?.invalid
        "
      />
      <div
        class="password__form-error"
        *ngIf="passwordForm.get('currentPassword')?.touched && 
                  passwordForm.get('currentPassword')?.errors?.['required']"
      >
        Obecne hasło jest wymagane
      </div>
      <div
        class="password__form-error"
        *ngIf="passwordForm.get('currentPassword')?.touched && 
                  passwordForm.get('currentPassword')?.errors?.['minlength']"
      >
        Hasło musi mieć minimum 6 znaków
      </div>
    </div>

    <div class="password__form-group">
      <label class="password__form-label">Nowe hasło:</label>
      <input
        type="password"
        formControlName="newPassword"
        class="password__form-input"
        [class.password__form-input--error]="
          passwordForm.get('newPassword')?.touched &&
          passwordForm.get('newPassword')?.invalid
        "
      />
      <div
        class="password__form-error"
        *ngIf="passwordForm.get('newPassword')?.touched && 
                  passwordForm.get('newPassword')?.errors?.['required']"
      >
        Nowe hasło jest wymagane
      </div>
      <div
        class="password__form-error"
        *ngIf="passwordForm.get('newPassword')?.touched && 
                  passwordForm.get('newPassword')?.errors?.['minlength']"
      >
        Hasło musi mieć minimum 6 znaków
      </div>
    </div>

    <div class="password__form-group">
      <label class="password__form-label">Potwierdź nowe hasło:</label>
      <input
        type="password"
        formControlName="confirmPassword"
        class="password__form-input"
        [class.password__form-input--error]="passwordForm.get('confirmPassword')?.touched && 
                                                (passwordForm.get('confirmPassword')?.invalid || 
                                                 passwordForm.errors?.['mismatch'])"
      />
      <div
        class="password__form-error"
        *ngIf="passwordForm.get('confirmPassword')?.touched && 
                  passwordForm.get('confirmPassword')?.errors?.['required']"
      >
        Potwierdzenie hasła jest wymagane
      </div>
      <div
        class="password__form-error"
        *ngIf="passwordForm.get('confirmPassword')?.touched && 
                  passwordForm.errors?.['mismatch']"
      >
        Hasła nie są identyczne
      </div>
    </div>

    <button
      type="submit"
      class="password__form-submit"
      [disabled]="passwordForm.invalid"
    >
      Zmień hasło
    </button>
  </form>
</div>
